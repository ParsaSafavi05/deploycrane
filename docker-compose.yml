version: '3.8'

services:
  deploycrane:
    # Use pre-built image from DockerHub
    image: parsasafavi/deploycrane:latest
    # OR build locally by uncommenting below and commenting out 'image'
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    container_name: deploycrane
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      LISTEN_PORT: "8080"
      SERVER_ADDR: "0.0.0.0"
      DB_PATH: "/app/data/deploycrane.db"
      CLONE_BASE_DIR: "/app/clones"
      IMAGE_PREFIX: "deploycrane"
      PORT_ALLOCATION_MIN: "8000"
      PORT_ALLOCATION_MAX: "9000"
      CORS_ORIGINS: "*"
    volumes:
      # Mount Docker socket to allow deploycrane to manage containers
      - /var/run/docker.sock:/var/run/docker.sock:rw
      # Persist database and cloned files
      - ./data:/app/data
      - ./clones:/app/clones
    # Uncomment the line below to enable DinD service dependency
    # depends_on:
    #   - docker
    networks:
      - deploycrane-net

  # Docker-in-Docker (optional, for isolated container management)
  # Uncomment this service if using DinD instead of host Docker socket
  docker:
    image: docker:dind
    container_name: deploycrane-dind
    restart: unless-stopped
    privileged: true
    volumes:
      - docker-data:/var/lib/docker
    networks:
      - deploycrane-net
    profiles:
      - dind

networks:
  deploycrane-net:
    driver: bridge

volumes:
  docker-data:
